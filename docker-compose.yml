version: '3.8'

services:
  # 1. Express.js REST API & Metrics Provider
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edumetrics-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DATA_DIR=/app/data
    volumes:
      - student-data:/app/data
    networks:
      - edumetrics-network

  # 2. Nginx Static Web Server & Reverse Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edumetrics-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edumetrics-network

  # 3. Prometheus Time-Series Metrics Scraper
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: edumetrics-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - edumetrics-network

  # 4. Grafana Visual Dashboard observability
  grafana:
    image: grafana/grafana:9.5.2
    container_name: edumetrics-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - edumetrics-network

volumes:
  student-data:
    driver: local

networks:
  edumetrics-network:
    driver: bridge
